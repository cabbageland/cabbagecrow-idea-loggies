<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1152" viewBox="0 0 2048 1152" role="img" aria-labelledby="title desc">
  <title id="title">CabbageCrow idea loggies preview</title>
  <desc id="desc">The CabbageCrow idea loggies board beside the desktop pet and a spark nudge bubble.</desc>
  <defs>
    <linearGradient id="board-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1211"/>
      <stop offset="0.62" stop-color="#141d23"/>
      <stop offset="1" stop-color="#232114"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="pet-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="10" flood-color="#000" flood-opacity="0.46"/>
    </filter>
    <mask id="brand-fade">
      <rect width="2048" height="1152" fill="black"/>
      <ellipse cx="750" cy="570" rx="520" ry="360" fill="white"/>
    </mask>
    <style>
      .ui { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .kicker { fill: #6ee7d8; font-size: 24px; font-weight: 760; }
      .title { fill: #f3ffd0; font-size: 56px; font-weight: 820; }
      .muted { fill: rgba(236, 255, 208, 0.72); font-size: 28px; }
      .label { fill: rgba(236, 255, 208, 0.58); font-size: 20px; }
      .value { fill: #f3ffd0; font-size: 28px; font-weight: 760; }
      .panel-text { fill: rgba(236, 255, 208, 0.82); font-size: 28px; }
      .button-text { fill: #f1ffd1; font-size: 31px; font-weight: 760; }
      .small-button-text { fill: #f1ffd1; font-size: 25px; }
      .caps { fill: #ecffd0; font-size: 23px; font-weight: 760; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="2048" height="1152" fill="#1f1f1e"/>

  <g class="ui" filter="url(#soft-shadow)">
    <rect x="50" y="60" width="1390" height="960" rx="30" fill="url(#board-bg)" stroke="rgba(173, 239, 80, 0.38)" stroke-width="2"/>
    <rect x="52" y="62" width="1386" height="956" rx="28" fill="none" stroke="rgba(74, 225, 199, 0.13)" stroke-width="2"/>
    <image href="../../public/brand/cabbageland-watermark.png" x="300" y="220" width="920" height="690" opacity="0.24" mask="url(#brand-fade)" preserveAspectRatio="xMidYMid meet"/>

    <text x="88" y="119" class="kicker">cabbagecrow bioscan</text>
    <text x="88" y="173" class="title">idea loggies</text>
    <text x="390" y="163" font-size="42">🪵</text>
    <text x="88" y="215" class="muted">4 unresolved sparks in the random pool</text>
    <rect x="1344" y="98" width="60" height="60" rx="15" fill="rgba(19, 34, 30, 0.84)" stroke="rgba(173, 239, 80, 0.34)" stroke-width="2"/>
    <text x="1371" y="137" fill="#ecffd0" font-size="26">x</text>

    <g>
      <rect x="88" y="248" width="250" height="98" rx="14" fill="rgba(5, 15, 15, 0.72)" stroke="rgba(110, 231, 216, 0.22)" stroke-width="2"/>
      <text x="108" y="292" class="label">date installed</text>
      <text x="108" y="325" class="value">May 20, 2026</text>
      <rect x="354" y="248" width="250" height="98" rx="14" fill="rgba(5, 15, 15, 0.72)" stroke="rgba(110, 231, 216, 0.22)" stroke-width="2"/>
      <text x="374" y="292" class="label">age now</text>
      <text x="374" y="325" class="value">3 days old</text>
      <rect x="620" y="248" width="250" height="98" rx="14" fill="rgba(5, 15, 15, 0.72)" stroke="rgba(110, 231, 216, 0.22)" stroke-width="2"/>
      <text x="640" y="292" class="label">added</text>
      <text x="640" y="325" class="value">17</text>
      <rect x="886" y="248" width="250" height="98" rx="14" fill="rgba(5, 15, 15, 0.72)" stroke="rgba(110, 231, 216, 0.22)" stroke-width="2"/>
      <text x="906" y="292" class="label">resolved</text>
      <text x="906" y="325" class="value">13</text>
      <rect x="1152" y="248" width="250" height="98" rx="14" fill="rgba(5, 15, 15, 0.72)" stroke="rgba(110, 231, 216, 0.22)" stroke-width="2"/>
      <text x="1172" y="292" class="label">left</text>
      <text x="1172" y="325" class="value">4</text>
    </g>

    <rect x="88" y="372" width="648" height="104" rx="16" fill="rgba(7, 18, 16, 0.66)" stroke="rgba(173, 239, 80, 0.28)" stroke-width="2"/>
    <text x="110" y="433" class="panel-text">Free range</text>
    <rect x="676" y="408" width="34" height="34" rx="10" fill="#fafafa" stroke="rgba(0, 0, 0, 0.35)" stroke-width="3"/>
    <rect x="756" y="372" width="648" height="104" rx="16" fill="rgba(7, 18, 16, 0.66)" stroke="rgba(173, 239, 80, 0.28)" stroke-width="2"/>
    <text x="778" y="433" class="panel-text">Spark cadence</text>
    <rect x="1172" y="389" width="214" height="70" rx="14" fill="rgba(8, 16, 16, 0.88)" stroke="#1b79eb" stroke-width="6"/>
    <text x="1192" y="434" fill="#f1ffd1" font-size="28">Gentle</text>
    <text x="1356" y="434" fill="#f1ffd1" font-size="30">⌄</text>

    <rect x="88" y="502" width="1316" height="108" rx="16" fill="rgba(7, 18, 16, 0.66)" stroke="rgba(173, 239, 80, 0.28)" stroke-width="2"/>
    <rect x="110" y="524" width="1138" height="68" rx="14" fill="rgba(8, 16, 16, 0.88)" stroke="rgba(110, 231, 216, 0.32)" stroke-width="2"/>
    <text x="134" y="568" fill="rgba(236, 255, 208, 0.46)" font-size="31">Capture a spark...</text>
    <rect x="1268" y="524" width="116" height="68" rx="13" fill="rgba(42, 69, 34, 0.9)" stroke="rgba(173, 239, 80, 0.4)" stroke-width="2"/>
    <text x="1294" y="569" class="button-text">Add</text>

    <rect x="88" y="640" width="1316" height="110" rx="16" fill="rgba(7, 18, 16, 0.66)" stroke="rgba(173, 239, 80, 0.28)" stroke-width="2"/>
    <text x="112" y="690" class="kicker" font-size="22">Currently Nudged</text>
    <text x="112" y="720" class="muted">No spark pulled yet.</text>
    <rect x="1134" y="668" width="244" height="58" rx="13" fill="rgba(42, 69, 34, 0.9)" stroke="rgba(173, 239, 80, 0.4)" stroke-width="2"/>
    <text x="1154" y="708" class="button-text">Pull One Now</text>

    <rect x="88" y="778" width="1316" height="204" rx="16" fill="rgba(7, 18, 16, 0.66)" stroke="rgba(173, 239, 80, 0.28)" stroke-width="2"/>
    <line x1="88" y1="848" x2="1404" y2="848" stroke="rgba(173, 239, 80, 0.22)" stroke-width="2"/>
    <text x="112" y="823" fill="rgba(236, 255, 208, 0.82)" font-size="26" font-weight="760">Pending Sparks</text>
    <text x="1032" y="823" fill="rgba(236, 255, 208, 0.82)" font-size="26" font-weight="760">4 left / 13 resolved / 17 added</text>
    <text x="120" y="924" fill="#f3ffd0" font-size="29">figure proposals</text>
    <rect x="1230" y="888" width="138" height="58" rx="12" fill="rgba(42, 69, 34, 0.9)" stroke="rgba(173, 239, 80, 0.4)" stroke-width="2"/>
    <text x="1250" y="925" class="caps">RESOLVE</text>

    <path d="M1362 974 L1419 918 L1419 974 Z" fill="rgba(166, 232, 72, 0.58)"/>
    <path d="M1390 974 L1419 945 L1419 974 Z" fill="rgba(110, 231, 216, 0.45)"/>
  </g>

  <g class="ui" filter="url(#soft-shadow)">
    <rect x="1482" y="78" width="524" height="144" rx="17" fill="rgba(8, 22, 19, 0.95)" stroke="rgba(173, 239, 80, 0.4)" stroke-width="2"/>
    <path d="M1722 222 L1766 222 L1744 244 Z" fill="rgba(8, 22, 19, 0.95)" stroke="rgba(173, 239, 80, 0.4)" stroke-width="2"/>
    <text x="1505" y="126" fill="rgba(236, 255, 208, 0.82)" font-size="28">figure proposals</text>
    <rect x="1742" y="148" width="116" height="54" rx="12" fill="rgba(42, 69, 34, 0.9)" stroke="rgba(173, 239, 80, 0.42)" stroke-width="2"/>
    <text x="1760" y="184" class="small-button-text">Resolve</text>
    <rect x="1876" y="148" width="108" height="54" rx="12" fill="rgba(42, 69, 34, 0.9)" stroke="rgba(173, 239, 80, 0.42)" stroke-width="2"/>
    <text x="1892" y="184" class="small-button-text">Bucket</text>
  </g>
  <image href="../../public/pets/cabbagecrow/browser-preview.png" x="1582" y="258" width="420" height="630" filter="url(#pet-shadow)" preserveAspectRatio="xMidYMid meet"/>
</svg>
